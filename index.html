<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#e8e5df" />
    <title>Metaball Studies</title>
  </head>
  <body>
    <main id="app">
      <header class="masthead">
        <div>
          <p class="eyebrow">Generative studies · 2020–2026</p>
          <h1>Metaball</h1>
        </div>
        <div class="study-picker">
          <button id="previous" aria-label="Previous study">←</button>
          <label>
            <span>Choose a study</span>
            <select id="study-select"></select>
          </label>
          <button id="next" aria-label="Next study">→</button>
        </div>
      </header>
      <section class="canvas-shell" aria-label="Metaball animation">
        <div id="canvas"></div>
        <div class="legend">
          <span id="study-number">01 / 09</span>
          <div class="study-description">
            <strong id="study-title">Two Interacting Metaballs</strong>
            <span id="study-note">The first shader study.</span>
            <span id="study-provenance">Historical · Dec 15, 2019 · a2387c6</span>
          </div>
        </div>
      </section>
    </main>
    <script type="module" src="/src/index.ts"></script>
  </body>
</html>
